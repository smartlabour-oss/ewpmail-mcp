<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STTH 789 - e-Tracking</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Prompt',sans-serif;background:#f5f7fa;color:#1a2744;min-height:100vh}
#loginScreen{position:fixed;inset:0;background:#f5f7fa;display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:#fff;padding:40px;border-radius:16px;text-align:center;box-shadow:0 4px 24px rgba(26,39,68,.1);border:1px solid #e8ecf2;max-width:380px;width:90%}
.login-box svg{margin-bottom:16px}
.login-box h2{font-size:18px;color:#1a2744;margin-bottom:4px}
.login-box p{font-size:13px;color:#6b7b96;margin-bottom:20px}
.login-box input{width:100%;padding:12px 16px;border:1.5px solid #d1d9e6;border-radius:8px;font-family:'Prompt';font-size:14px;outline:none;text-align:center;letter-spacing:2px}
.login-box input:focus{border-color:#1a2744}
.login-box button{width:100%;padding:12px;margin-top:12px;background:#1a2744;color:#fff;border:none;border-radius:8px;font-family:'Prompt';font-size:14px;font-weight:600;cursor:pointer;transition:background .2s}
.login-box button:hover{background:#2d4a7a}
.login-err{color:#c41e3a;font-size:12px;margin-top:8px;display:none}
#app{display:none}

.header{background:#fff;padding:20px 40px;display:flex;align-items:center;gap:20px;border-bottom:3px solid #1a2744;box-shadow:0 2px 12px rgba(26,39,68,.08)}
.logo-wrap{flex-shrink:0}
.header .title h1{font-size:20px;font-weight:700;color:#1a2744}
.header .title .sub{font-size:12px;color:#6b7b96;margin-top:2px}
.date-box{margin-left:auto;text-align:right;background:#1a2744;color:#fff;padding:10px 20px;border-radius:10px}
