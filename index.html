<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STTH 789 - รายงาน e-Tracking</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* PASSWORD LOCK SCREEN STYLES */
.login-container{position:fixed;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(135deg,#f5f7fa 0%,#e8ecf2 100%);
  display:flex;align-items:center;justify-content:center;z-index:9999;
  font-family:'Prompt',sans-serif}
.login-container.hidden{display:none}
.login-box{background:#fff;border-radius:16px;padding:48px 40px;
  box-shadow:0 10px 40px rgba(26,39,68,.15);max-width:420px;width:100%;text-align:center}
.login-logo{margin-bottom:32px}
.login-logo svg{width:120px;height:80px}
.login-title{font-size:24px;font-weight:700;color:#1a2744;margin-bottom:8px;letter-spacing:-.5px}
.login-subtitle{font-size:14px;color:#6b7b96;margin-bottom:32px;font-weight:400;line-height:1.5}
.login-form{display:flex;flex-direction:column;gap:16px}
.password-input{padding:12px 16px;border:2px solid #d1d9e6;border-radius:8px;
  font-family:'Prompt',sans-serif;font-size:14px;color:#1a2744;outline:none;
  transition:border-color .2s;background:#f8fafc}
.password-input:focus{border-color:#1a2744;background:#fff}
.password-input::placeholder{color:#b0b9cc}
.login-btn{padding:12px 16px;background:#1a2744;color:#fff;border:none;
  border-radius:8px;font-family:'Prompt',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;transition:background .2s;letter-spacing:.3px}
.login-btn:hover{background:#0f1a32}
.login-btn:active{background:#0a1125}
.error-message{color:#c41e3a;font-size:13px;margin-top:8px;min-height:18px;font-weight:500}
</style>
